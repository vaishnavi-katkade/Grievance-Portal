<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - Grievance Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-brand">
      <img src="logo.png" alt="College Logo" class="nav-logo">
      <div>
        <h2>User Management - Admin Panel</h2>
        <span class="college-name">Shreeyash Pratishthan, Chhatrapati Sambhajinagar</span>
      </div>
    </div>
    <div>
      <button onclick="window.location.href='admin.html'" class="secondary">Back to Dashboard</button>
     <!-- <button onclick="logout()">Logout</button>-->
    </div>
  </nav>

  <div class="container">
    <!-- Statistics -->
    <h3>👥 User Statistics</h3>
    <div class="stats-container">
      <div class="stat-card blue">
        <div class="number" id="totalStudents">0</div>
        <h4>Total Students</h4>
      </div>
    </div>



    <!-- All Students Table -->
    <h3>📋 All Students</h3>
    
    <div class="filter-section">
      <input 
        type="text" 
        id="searchStudents" 
        placeholder="🔍 Search by enrollment or name..." 
        onkeyup="filterStudents()"
      >
      <button onclick="loadStudents()" class="secondary">Refresh</button>
    </div>

    <div class="table-container">
      <table id="studentsTable">
        <thead>
          <tr>
            <th>Enrollment Number</th>
            <th>Name</th>
            <th>Username (Login)</th>
            <th>Date Added</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="emptyStudentsState" class="empty-state" style="display: none;">
      <p style="font-size: 3rem;">👥</p>
      <h3 style="color: #666;">No Students Added</h3>
      <p>Add students using the forms above.</p>
    </div>
  </div>

  <script src="public/api.js"></script>
  <script src="public/manage-users.js"></script>
</body>
</html>
