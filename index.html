<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Grievance Portal - Login</title>
  <link rel="stylesheet" href="style.css">
  <!-- Add Font Awesome for eye icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <img src="logo.png" alt="College Logo">
      </div>

      <h1>College Grievance Portal</h1>
      <p class="subtitle">Shreeyash Pratishthan, Chhatrapati Sambhajinagar</p>

      <h2>Portal Login</h2>

      <div id="alertContainer"></div>
      <!-- 
      <div class="login-tabs" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <button type="button" id="tabStudent" class="tab-btn active" onclick="switchTab('student')"
          style="background: #003366; color: white;">Student</button>
      </div> -->

      <form id="loginForm" action="/api/auth/login" method="POST" onsubmit="login(event)">
        <input type="hidden" id="loginRole" value="student">

        <div id="studentFields">
          <input type="text" id="enrollment" name="enrollmentNumber" placeholder="Enrollment Number" required
            style="width: 100%;">

          <div style="margin-bottom: 20px;">
            <input type="email" id="email" name="email" placeholder="Email Address" required style="width: 100%;">
          </div>
        </div>

        <div id="adminFields" style="display: none;">
          <input type="email" id="email" name="email" placeholder="Email Address">
          <div style="margin-bottom: 20px;">
            <input type="password" id="password" name="password" placeholder="Password" style="width: 100%;">
          </div>
        </div>

        <div style="text-align: center; margin-top: 1.5rem;">
          <button type="submit" id="loginBtn" style="width: auto; padding: 0.8rem 2.5rem;">LOGIN TO PORTAL</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function switchTab(role) {
      document.getElementById('loginRole').value = role;

      const tabStudent = document.getElementById('tabStudent');
      const tabAdmin = document.getElementById('tabAdmin');
      const studentFields = document.getElementById('studentFields');
      const adminFields = document.getElementById('adminFields');

      const studentInputs = studentFields.querySelectorAll('input, button');
      const adminInputs = adminFields.querySelectorAll('input, button');

      if (role === 'student') {
        tabStudent.style.background = '#003366';
        tabStudent.style.color = 'white';
        tabAdmin.style.background = '#e0e0e0';
        tabAdmin.style.color = '#333';

        studentFields.style.display = 'block';
        adminFields.style.display = 'none';

        studentInputs.forEach(el => el.disabled = false);
        adminInputs.forEach(el => el.disabled = true);
      } else {
        tabAdmin.style.background = '#003366';
        tabAdmin.style.color = 'white';
        tabStudent.style.background = '#e0e0e0';
        tabStudent.style.color = '#333';

        studentFields.style.display = 'none';
        adminFields.style.display = 'block';

        studentInputs.forEach(el => el.disabled = true);
        adminInputs.forEach(el => el.disabled = false);
      }
    }
  </script>
  <script src="public/api.js"></script>
  <script src="public/script.js"></script>
</body>

</html>
